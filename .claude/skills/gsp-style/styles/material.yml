name: material
description: Material Design 3 â€” adaptive color, organic shapes, expressive motion, state layers
tags: [material, google, android, rounded, colorful]

tokens:
  color:
    primary: "#6750A4"
    secondary: "#625B71"
    accent: "#BB86FC"
    background: "#FFFBFE"
    surface: "#F3EDF7"
    on-primary: "#FFFFFF"
    on-background: "#1C1B1F"
    error: "#B3261E"
    success: "#16A34A"
    warning: "#F59E0B"
    info: "#3B82F6"
    muted: "#79747E"

  typography:
    font-family-primary: "Roboto, system-ui, sans-serif"
    font-family-mono: "Roboto Mono, monospace"
    font-weight-heading: 500
    font-weight-body: 400
    font-size-base: "16px"
    line-height-base: 1.5

  shape:
    border-radius-sm: "8px"
    border-radius-md: "12px"
    border-radius-lg: "16px"
    border-radius-xl: "28px"
    border-width: "1px"
    border-color: "#79747E"

  elevation:
    shadow-sm: "0 1px 2px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.15)"
    shadow-md: "0 1px 2px rgba(0,0,0,0.3), 0 2px 6px rgba(0,0,0,0.15)"
    shadow-lg: "0 4px 8px rgba(0,0,0,0.3), 0 6px 12px rgba(0,0,0,0.15)"
    shadow-xl: "0 8px 12px rgba(0,0,0,0.3), 0 12px 24px rgba(0,0,0,0.15)"

  spacing:
    base: 8
    scale: [0, 8, 16, 24, 32, 40, 48, 56, 64, 72, 80, 96]

  motion:
    duration-fast: "200ms"
    duration-normal: "300ms"
    easing: "cubic-bezier(0.2, 0, 0, 1)"

dark_mode:
  color:
    background: "#1C1B1F"
    surface: "#2B2930"
    on-background: "#E6E1E5"

intensity:
  variance: 4     # organic blur shapes and asymmetric elevation create interest, but grids stay structured
  motion: 6       # state layers animate smoothly, scale feedback on press, glow reveals on hover
  density: 4      # generous padding, relaxed spacing, content breathes within tonal surfaces

patterns:
  card:
    border: "none â€” tonal surface separation, not borders"
    shadow: "{elevation.shadow-sm} resting, {elevation.shadow-md} on hover"
    radius: "{shape.border-radius-xl}"
    background: "{color.surface}"
    hover: "hover:scale-[1.02] with shadow transition"
  button-primary:
    background: "{color.primary}"
    border: "none"
    shadow: "none resting, {elevation.shadow-md} on hover"
    text: "weight 500, sentence case, {color.on-primary}"
    radius: "rounded-full"
    state-layer: "bg-{color.primary}/90 on hover, /80 on active"
  button-secondary:
    background: "{color.surface}"
    border: "none"
    text: "weight 500, sentence case, on-secondary-container"
    radius: "rounded-full"
    state-layer: "bg-{color.primary}/10 on hover"
  input:
    border: "2px solid {shape.border-color} on bottom only"
    radius: "rounded-t-lg, square bottom"
    background: "surface-container-low ({color.surface} darker)"
    focus: "bottom border shifts to {color.primary}"
    height: "h-14"
  badge:
    shape: "rounded-full"
    text: "text-xs font-medium"
    background: "{color.primary}/15 with {color.primary} text"
  nav:
    style: "horizontal tabs or bottom nav"
    selection: "underline indicator in {color.primary} for tabs"
    hover: "bg-{color.primary}/10 state layer"
  layout:
    archetype: "tonal-surface-hierarchy"
    max-width: "container mx-auto"
    section-spacing: "py-12 to py-24"
    grid-gap: "gap-6 to gap-8"
    surfaces: "tonal â€” never pure white, layer: backgroundâ†’surface-containerâ†’surface-container-low"
    decoration: "organic blur shapes (blur-3xl) in primary/secondary/tertiary at 10-30% opacity"
    hero: "extra-large radius (rounded-[48px]) container with surface-container background"

constraints:
  never:
    - "pure white (#FFFFFF) backgrounds â€” always use tinted surface color"
    - "rectangular buttons â€” all buttons must be rounded-full (pill-shaped)"
    - "heavy drop shadows â€” subtle elevation with tonal surfaces preferred"
    - "hover color changes on solid buttons â€” use state layers (opacity overlays) instead"
    - "sharp corners on major containers â€” 24px minimum card radius"
    - "borders for container separation â€” use tonal backgrounds instead"
    - "pure black text â€” use on-surface (#1C1B1F) with warmth"
    - "flat inputs â€” filled text field style with bottom border required"
  always:
    - "pill-shaped (rounded-full) buttons on every variant"
    - "organic blur shapes in hero and key sections"
    - "state layer interaction model (opacity overlays, not color shifts)"
    - "active:scale-95 on all clickable elements for tactile feedback"
    - "tonal surface hierarchy (backgroundâ†’containerâ†’container-low)"
    - "Material easing cubic-bezier(0.2, 0, 0, 1) on all transitions"
    - "generous border radii: 24px cards, 32-48px hero sections"

effects:
  interaction-vocabulary: [state-layer, tactile-press, tonal-step, glow-reveal, hover-scale]
  hover:
    card: "hover-scale â€” scale-[1.02], shadow steps smâ†’md"
    button-primary: "state-layer â€” bg-{color.primary}/90 overlay"
    button-secondary: "state-layer â€” bg-{color.primary}/10 overlay"
    image: "hover-scale â€” scale-105 with overflow-hidden"
  active:
    button: "tactile-press â€” active:scale-95, state-layer at /80"
  focus:
    general: "ring-2 ring-{color.primary} ring-offset-2"
  transition: "duration-200 to duration-300, cubic-bezier(0.2, 0, 0, 1)"
  ambient:
    - "glow-reveal â€” hidden blur behind badges reveals on hover (opacity-0â†’30)"
    - "blob-drift â€” organic background shapes with mix-blend-multiply"

compatibility: [professional, fluent]
clashes: [neubrutalism, monochrome, retro]
